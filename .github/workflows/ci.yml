name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PGPASSWORD: postgres
      PGUSER: postgres
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ground_up_wall_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install --lock=deno.lock

      - name: Wait for PostgreSQL
        run: |
          for i in {1..60}; do
            if PGPASSWORD=postgres psql -h postgres -p 5432 -U postgres -d ground_up_wall_test -c "SELECT 1" >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/60)"
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/ground_up_wall_test
          DATABASE_URL_TEST: postgres://postgres:postgres@postgres:5432/ground_up_wall_test
        run: deno run -A scripts/migrate.ts

      - name: Run smoke tests (PR)
        if: github.event_name == 'pull_request'
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/ground_up_wall_test
          DATABASE_URL_TEST: postgres://postgres:postgres@postgres:5432/ground_up_wall_test
        run: deno task test:e2e:smoke

      - name: Run full test suite (main)
        if: github.event_name == 'push'
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/ground_up_wall_test
          DATABASE_URL_TEST: postgres://postgres:postgres@postgres:5432/ground_up_wall_test
        run: deno task test

      - name: Run lint and format check
        run: deno task check